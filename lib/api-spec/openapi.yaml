openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Tiệm Chu Du API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: blogs
    description: Blog post operations
  - name: order-rules
    description: Order rules and regulations
  - name: welcome
    description: Welcome page content
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /blogs:
    get:
      operationId: listBlogs
      tags: [blogs]
      summary: List all blog posts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: published
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"
    post:
      operationId: createBlog
      tags: [blogs]
      summary: Create a new blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogInput"
      responses:
        "201":
          description: Created blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"

  /blogs/recent:
    get:
      operationId: listRecentBlogs
      tags: [blogs]
      summary: List recent published blog posts
      responses:
        "200":
          description: Recent blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"

  /blogs/{id}:
    get:
      operationId: getBlog
      tags: [blogs]
      summary: Get a blog post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        "404":
          description: Not found
    patch:
      operationId: updateBlog
      tags: [blogs]
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogUpdate"
      responses:
        "200":
          description: Updated blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
    delete:
      operationId: deleteBlog
      tags: [blogs]
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /order-rules:
    get:
      operationId: listOrderRules
      tags: [order-rules]
      summary: List all order rules
      responses:
        "200":
          description: List of order rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderRule"
    post:
      operationId: createOrderRule
      tags: [order-rules]
      summary: Create a new order rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRuleInput"
      responses:
        "201":
          description: Created order rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderRule"

  /order-rules/{id}:
    patch:
      operationId: updateOrderRule
      tags: [order-rules]
      summary: Update an order rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRuleUpdate"
      responses:
        "200":
          description: Updated order rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderRule"
    delete:
      operationId: deleteOrderRule
      tags: [order-rules]
      summary: Delete an order rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /welcome:
    get:
      operationId: getWelcome
      tags: [welcome]
      summary: Get welcome page content
      responses:
        "200":
          description: Welcome page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WelcomePage"
    patch:
      operationId: updateWelcome
      tags: [welcome]
      summary: Update welcome page content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WelcomePageUpdate"
      responses:
        "200":
          description: Updated welcome page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WelcomePage"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Blog:
      type: object
      required: [id, title, content, published, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        excerpt:
          type: ["string", "null"]
        coverImage:
          type: ["string", "null"]
        published:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BlogInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        excerpt:
          type: string
        coverImage:
          type: string
        published:
          type: boolean
          default: false

    BlogUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
        excerpt:
          type: string
        coverImage:
          type: string
        published:
          type: boolean

    OrderRule:
      type: object
      required: [id, title, content, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderRuleInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        sortOrder:
          type: integer
          default: 0

    OrderRuleUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
        sortOrder:
          type: integer

    WelcomePage:
      type: object
      required: [id, headline, subheadline, body, updatedAt]
      properties:
        id:
          type: integer
        headline:
          type: string
        subheadline:
          type: string
        body:
          type: string
        updatedAt:
          type: string
          format: date-time

    WelcomePageUpdate:
      type: object
      properties:
        headline:
          type: string
        subheadline:
          type: string
        body:
          type: string
