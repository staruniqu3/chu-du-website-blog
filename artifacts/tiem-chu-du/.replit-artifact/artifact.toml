kind = "web"
previewPath = "/"
title = "Tiệm Chu Du"
version = "1.0.0"
id = "artifacts/tiem-chu-du"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25456

[services.development]
run = "pnpm --filter @workspace/tiem-chu-du run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tiem-chu-du", "run", "build" ]
publicDir = "artifacts/tiem-chu-du/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25456"
BASE_PATH = "/"
