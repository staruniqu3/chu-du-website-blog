[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && NODE_ENV=production pnpm --filter @workspace/tiem-chu-du run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
