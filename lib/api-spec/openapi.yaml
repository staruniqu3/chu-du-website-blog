openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Tiệm Chu Du API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: blogs
    description: Blog post operations
  - name: order-rules
    description: Order rules and regulations
  - name: welcome
    description: Welcome page content
  - name: features
    description: Shop features/services
  - name: portfolio
    description: Portfolio projects
  - name: admin
    description: Admin authentication
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /blogs:
    get:
      operationId: listBlogs
      tags: [blogs]
      summary: List all blog posts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: published
          in: query
          schema:
            type: boolean
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"
    post:
      operationId: createBlog
      tags: [blogs]
      summary: Create a new blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogInput"
      responses:
        "201":
          description: Created blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"

  /blogs/recent:
    get:
      operationId: listRecentBlogs
      tags: [blogs]
      summary: List recent published blog posts
      responses:
        "200":
          description: Recent blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"

  /blogs/{id}:
    get:
      operationId: getBlog
      tags: [blogs]
      summary: Get a blog post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        "404":
          description: Not found
    patch:
      operationId: updateBlog
      tags: [blogs]
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogUpdate"
      responses:
        "200":
          description: Updated blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
    delete:
      operationId: deleteBlog
      tags: [blogs]
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /order-rules:
    get:
      operationId: listOrderRules
      tags: [order-rules]
      summary: List all order rules
      responses:
        "200":
          description: List of order rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderRule"
    post:
      operationId: createOrderRule
      tags: [order-rules]
      summary: Create a new order rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRuleInput"
      responses:
        "201":
          description: Created order rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderRule"

  /order-rules/{id}:
    patch:
      operationId: updateOrderRule
      tags: [order-rules]
      summary: Update an order rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRuleUpdate"
      responses:
        "200":
          description: Updated order rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderRule"
    delete:
      operationId: deleteOrderRule
      tags: [order-rules]
      summary: Delete an order rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /welcome:
    get:
      operationId: getWelcome
      tags: [welcome]
      summary: Get welcome page content
      responses:
        "200":
          description: Welcome page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WelcomePage"
    patch:
      operationId: updateWelcome
      tags: [welcome]
      summary: Update welcome page content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WelcomePageUpdate"
      responses:
        "200":
          description: Updated welcome page content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WelcomePage"

  /features:
    get:
      operationId: listFeatures
      tags: [features]
      summary: List all shop features
      responses:
        "200":
          description: List of features
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Feature"
    post:
      operationId: createFeature
      tags: [features]
      summary: Create a new feature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureInput"
      responses:
        "201":
          description: Created feature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feature"

  /features/{id}:
    patch:
      operationId: updateFeature
      tags: [features]
      summary: Update a feature
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureUpdate"
      responses:
        "200":
          description: Updated feature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feature"
    delete:
      operationId: deleteFeature
      tags: [features]
      summary: Delete a feature
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /portfolio:
    get:
      operationId: listPortfolio
      tags: [portfolio]
      summary: List all portfolio items
      responses:
        "200":
          description: List of portfolio items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioItem"
    post:
      operationId: createPortfolioItem
      tags: [portfolio]
      summary: Create a new portfolio item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioItemInput"
      responses:
        "201":
          description: Created portfolio item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioItem"

  /portfolio/{id}:
    patch:
      operationId: updatePortfolioItem
      tags: [portfolio]
      summary: Update a portfolio item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioItemUpdate"
      responses:
        "200":
          description: Updated portfolio item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioItem"
    delete:
      operationId: deletePortfolioItem
      tags: [portfolio]
      summary: Delete a portfolio item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/auth/status:
    get:
      operationId: getAdminAuthStatus
      tags: [admin]
      summary: Check if admin password is set up
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthStatus"

  /admin/auth/setup:
    post:
      operationId: setupAdminPassword
      tags: [admin]
      summary: Set up admin password for the first time
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPasswordSetup"
      responses:
        "200":
          description: Password set up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "409":
          description: Password already set up

  /admin/auth/login:
    post:
      operationId: loginAdmin
      tags: [admin]
      summary: Verify admin password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLogin"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "401":
          description: Wrong password

  /admin/auth/change-password:
    post:
      operationId: changeAdminPassword
      tags: [admin]
      summary: Change admin password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminChangePassword"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"
        "401":
          description: Wrong current password

  /settings/contact:
    get:
      operationId: getContactSettings
      tags: [welcome]
      summary: Get contact settings
      responses:
        "200":
          description: Contact settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSettings"
    patch:
      operationId: updateContactSettings
      tags: [welcome]
      summary: Update contact settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactSettingsUpdate"
      responses:
        "200":
          description: Updated contact settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Blog:
      type: object
      required: [id, title, content, published, category, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        excerpt:
          type: ["string", "null"]
        coverImage:
          type: ["string", "null"]
        published:
          type: boolean
        category:
          type: string
          default: "blog"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BlogInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        excerpt:
          type: string
        coverImage:
          type: string
        published:
          type: boolean
          default: false
        category:
          type: string
          default: "blog"

    BlogUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
        excerpt:
          type: string
        coverImage:
          type: string
        published:
          type: boolean
        category:
          type: string

    OrderRule:
      type: object
      required: [id, title, content, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderRuleInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        sortOrder:
          type: integer
          default: 0

    OrderRuleUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
        sortOrder:
          type: integer

    WelcomePage:
      type: object
      required: [id, headline, subheadline, body, updatedAt]
      properties:
        id:
          type: integer
        headline:
          type: string
        subheadline:
          type: string
        body:
          type: string
        updatedAt:
          type: string
          format: date-time

    WelcomePageUpdate:
      type: object
      properties:
        headline:
          type: string
        subheadline:
          type: string
        body:
          type: string

    Feature:
      type: object
      required: [id, title, description, icon, enabled, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        enabled:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FeatureInput:
      type: object
      required: [title, description, icon]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        icon:
          type: string
          default: "star"
        enabled:
          type: boolean
          default: true
        sortOrder:
          type: integer
          default: 0

    FeatureUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        icon:
          type: string
        enabled:
          type: boolean
        sortOrder:
          type: integer

    PortfolioItem:
      type: object
      required: [id, title, description, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        coverImage:
          type: ["string", "null"]
        link:
          type: ["string", "null"]
        tags:
          type: string
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PortfolioItemInput:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        coverImage:
          type: string
        link:
          type: string
        tags:
          type: string
          default: ""
        sortOrder:
          type: integer
          default: 0

    PortfolioItemUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        coverImage:
          type: string
        link:
          type: string
        tags:
          type: string
        sortOrder:
          type: integer

    AdminAuthStatus:
      type: object
      required: [hasPassword]
      properties:
        hasPassword:
          type: boolean

    AdminPasswordSetup:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 4

    AdminLogin:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminChangePassword:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 4

    AdminAuthResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    ContactSettings:
      type: object
      required: [id, email, updatedAt]
      properties:
        id:
          type: integer
        email:
          type: string
        updatedAt:
          type: string
          format: date-time

    ContactSettingsUpdate:
      type: object
      properties:
        email:
          type: string
